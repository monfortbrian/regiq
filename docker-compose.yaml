services:
  regiq-api:
    build: .
    container_name: regiq-api
    ports:
      - "8000:8000"

    restart: unless-stopped

    # Environment variables
    # Reads from your .env file — OPENAI_API_KEY stays out of the image
    env_file:
      - .env

    volumes:
      - ./data/chroma_db:/app/data/chroma_db

    # Health check
    # Docker checks /health every 30s.
    # If it fails 3 times, Docker restarts the container automatically.
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s